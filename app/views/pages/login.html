<section class="page-hero">
    <h1>Login Admin</h1>
    <p>Acesse o painel para acompanhar e gerenciar as solicitações de reserva.</p>
</section>

<div class="login-panel">
    <form id="login-form">
        <div class="form-group">
            <label for="usuario">Usuário</label>
            <input type="text" id="usuario" name="usuario" required>
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required>
        </div>

        <button type="submit" class="btn">Entrar</button>
    </form>

    <p id="login-msg"></p>
</div>

<script>
document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const form = e.target;
    const data = {
        usuario: form.usuario.value,
        senha: form.senha.value
    };

    try {
        const response = await fetch("/parque_ecologico/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include",
            body: JSON.stringify(data)
        });

        const result = await response.json();
        const mensagem = document.getElementById("login-msg");

        if (response.ok) {
            mensagem.innerText = result.mensagem || "Login realizado com sucesso";
            localStorage.setItem("csrf_token", result.csrf_token);

            setTimeout(() => {
                window.location.href = "/parque_ecologico/admin";
            }, 700);
        } else {
            mensagem.innerText = result.mensagem || result.erro || "Não foi possível entrar";
        }
    } catch (err) {
        document.getElementById("login-msg").innerText = "Erro na requisição";
    }
});
</script>
